name: Build and Scan

on:
  workflow_dispatch:

# 必须显式声明权限，否则 Fork 仓库无法上传报告
permissions:
  actions: read
  contents: read
  security-events: write 

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4 # 升级到 v4

      # ... 中间是编译步骤 ...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4 # 升级到 v4
